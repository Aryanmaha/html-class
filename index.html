<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>movie app api </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <div class="header">
      <div class="left">
        <h2>Movie<span>HOOD</span></h2>
      </div>
      <div class="right">
        <ul>
          <li>Movies</li>
          <li>TV shows</li>
          <li>Watchlist</li>
          <li>login </li>
        </ul>
      </div>
    </div>
    <div class="search">
      <h2>Search for your movies:</h2>
      <input type="text" class = "search_bar" placeholder="Search movies..." autofocus>
      <button> <i class="fa fa-search" aria-hidden="true"></i></button>
  </div>
  <div class="main_body">
    <div class="trending_movies">
      <h2>Trending movies:</h2>
      <div class="trending_movie_Card">
       </div>
    </div>
    <div class="Discover_movies">
      <h2>Discover movies:</h2>
      <div class="discover_movie_Card">
       </div>
    </div>
    <div class="popular_movies">
      <h2>Popular movies:</h2>
      <div class="popular_movie_Card">
       </div>
    </div>
  </div>
  <div class="pop-up_container" id = "popup">
    <img src="poster.jpg">
    <h2> popup workiing </h2>
  </div>
    <script src="script.js" charset="utf-8"></script>
  </body>
</html>
